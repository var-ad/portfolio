# .github/workflows/snake.yml
name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: var-ad
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=222222,060010,f65020
            dist/github-snake-light.svg?palette=888888,a0a0a0,ffffff

      - name: Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist